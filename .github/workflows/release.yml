name: "Release Windows Only"

on:
  workflow_dispatch: # Memungkinkan Anda memicu rilis secara manual dari tab Actions di GitHub
  push:
    tags:
      - "v*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version
        id: get_version
        # Sekarang GitHub akan otomatis membaca versi dari package.json Anda!
        run: echo "VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json')).version)")" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          # Extract the first version block from CHANGELOG.md (between first and second ## headings)
          BODY=$(awk '/^## \[/{if(found) exit; found=1; next} found' CHANGELOG.md || echo "Rilis Cicem Drive versi 0.9.1 untuk Windows.")
          # Escape for GitHub Actions output
          echo "BODY<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create-release
        uses: actions/github-script@v7
        env:
          RELEASE_BODY: ${{ steps.changelog.outputs.BODY }}
          RELEASE_VERSION: ${{ steps.get_version.outputs.VERSION }}
        with:
          script: |
            const tag = `v${process.env.RELEASE_VERSION}`;
            try {
              const { data: existingRelease } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: tag
              });
              await github.rest.repos.updateRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existingRelease.id,
                body: process.env.RELEASE_BODY,
                draft: true
              });
              console.log(`Updated existing release for tag ${tag} (ID: ${existingRelease.id})`);
              return existingRelease.id;
            } catch (err) {
              if (err.status === 404) {
                const { data: newRelease } = await github.rest.repos.createRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  tag_name: tag,
                  name: `Cicem Drive v${process.env.RELEASE_VERSION}`,
                  body: process.env.RELEASE_BODY,
                  draft: true,
                  prerelease: false
                });
                console.log(`Created new release for tag ${tag} (ID: ${newRelease.id})`);
                return newRelease.id;
              } else {
                throw err;
              }
            }

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # Hanya Windows
          - platform: windows-latest
            args: ""
            target: "x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: app
        run: npm install

      - name: Prepare Tauri signing key
        shell: node {0}
        env:
          KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          const fs = require('fs');
          const key = process.env.KEY.trim();
          // Tauri expects TAURI_SIGNING_PRIVATE_KEY to be base64-encoded.
          const b64 = key.startsWith('untrusted comment:')
            ? Buffer.from(key).toString('base64')
            : key;
          fs.appendFileSync(process.env.GITHUB_ENV, `TAURI_SIGNING_PRIVATE_KEY=${b64}\n`);

      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ env.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          projectPath: ./app
          args: ${{ matrix.args }}

  publish-release:
    needs: [create-release, build-tauri]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish Release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
